name: React Doctor

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read
  pull-requests: write
  issues: write
  statuses: write

jobs:
  react-doctor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: millionco/react-doctor@938008119a288f2fb47c66a69cd9279a21f31784
